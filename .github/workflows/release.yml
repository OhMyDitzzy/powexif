name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build release binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: powexif-linux-x86_64
            archive: powexif-linux-x86_64.tar.gz
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: powexif-linux-aarch64
            archive: powexif-linux-aarch64.tar.gz
            use_cross: true

          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            artifact: powexif-linux-armv7
            archive: powexif-linux-armv7.tar.gz
            use_cross: true

          - target: i686-unknown-linux-gnu
            os: ubuntu-latest
            artifact: powexif-linux-i686
            archive: powexif-linux-i686.tar.gz
            use_cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: powexif-macos-x86_64
            archive: powexif-macos-x86_64.tar.gz
            use_cross: false

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: powexif-macos-aarch64
            archive: powexif-macos-aarch64.tar.gz
            use_cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: powexif-windows-x86_64.exe
            archive: powexif-windows-x86_64.zip
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/powexif ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/powexif.exe ${{ matrix.artifact }}

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czf ${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.archive }}

      - name: Generate checksum (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
          fi

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -FilePath "${{ matrix.archive }}.sha256" -Encoding ASCII

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256